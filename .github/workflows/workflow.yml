name: CI/CD

# Mirrors the TimeWarp.Nuru / TimeWarp.Amuru pattern: one job, one "Run CI Pipeline" step that
# calls the C# `dev workflow` command. Mode is auto-detected from GITHUB_EVENT_NAME inside the
# command (push/PR -> build+test; release/dispatch -> build+pack+push, no test gate). Publishing
# uses OIDC Trusted Publishing (no stored API key) and only runs on a published release.

on:
  push:
    branches:
      - master
    paths:
      - 'source/**'
      - 'tests/**'
      - 'timewarp-templates/**'
      - '.template.config/**'
      - 'tools/**'
      - 'msbuild/**'
      - '.github/workflows/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'Directory.Version.props'
  pull_request:
    branches:
      - master
    paths:
      - 'source/**'
      - 'tests/**'
      - 'timewarp-templates/**'
      - '.template.config/**'
      - 'tools/**'
      - 'msbuild/**'
      - '.github/workflows/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'Directory.Version.props'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for NuGet Trusted Publishing (OIDC)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for SourceLink / version metadata

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Integration tests hit the servers over HTTPS with the ASP.NET dev certificate; trust it so the
      # runner's HttpClient doesn't fail with UntrustedRoot (passes locally only because the dev box
      # already trusts it). On Linux, `--trust` writes the cert to ~/.aspnet/dev-certs/trust and exits
      # 4 ("trusted by some clients") — OpenSSL (HttpClient) only honours it once that dir is on
      # SSL_CERT_DIR (set on the Run CI Pipeline step below). See https://aka.ms/dev-certs-trust.
      - name: Trust HTTPS dev certificate
        if: github.event_name != 'release'
        run: dotnet dev-certs https --trust || true

      - name: NuGet login (OIDC Trusted Publishing)
        if: github.event_name == 'release'
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: TimeWarp.Enterprises

      - name: Run CI Pipeline
        run: |
          # Make OpenSSL (the runner's HttpClient) honour the trusted dev cert (see Trust step above).
          export SSL_CERT_DIR="$HOME/.aspnet/dev-certs/trust:/usr/lib/ssl/certs:/etc/ssl/certs"
          if [ "${{ github.event_name }}" == "release" ]; then
            dotnet run tools/dev-cli/dev.cs -- workflow --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          else
            dotnet run tools/dev-cli/dev.cs -- workflow
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Packages-${{ github.run_number }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: ignore
