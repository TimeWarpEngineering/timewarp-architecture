name: CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target: foundation | template | all'
        default: all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet run tools/dev-cli/dev.cs -- build
      - name: Test
        run: dotnet run tools/dev-cli/dev.cs -- test

  # Pack + push NuGet packages. All logic lives in C# (tools/dev-cli/endpoints/publish-command.cs);
  # this is a thin trigger. Single repo version (Directory.Version.props) → all packages move
  # together, so `--target all` + --skip-duplicate is idempotent (only the bumped version pushes).
  publish:
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      NUGET_API_KEY: ${{ secrets.PUBLISH_TO_NUGET_ORG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for SourceLink / version metadata
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish
        run: dotnet run tools/dev-cli/dev.cs -- publish --target ${{ github.event.inputs.target || 'all' }}
