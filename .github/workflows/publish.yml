name: publish

# Thin trigger. ALL publish logic (pack + push) lives in C#: tools/dev-cli/endpoints/publish-command.cs.
# The repo uses a single version (Directory.Version.props), so every package — the TimeWarp.Foundation.*
# libraries and the TimeWarp.Architecture template — moves together. --skip-duplicate (in the command)
# makes this idempotent: a push only publishes the version that isn't already on the feed.
#
# To publish a subset, pass a target: `dev publish --target foundation` (or `template`). A path-filtered
# trigger can compute that target and pass it as the param; for a single-version repo, `all` is correct.

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to publish: foundation | template | all'
        default: all

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      NUGET_API_KEY: ${{ secrets.PUBLISH_TO_NUGET_ORG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for SourceLink / version metadata

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet run tools/dev-cli/dev.cs -- publish --target ${{ github.event.inputs.target || 'all' }}
